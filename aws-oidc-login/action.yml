name: aws-oidc-login
description: Assume an AWS IAM role via GitHub OIDC (keyless). Mirrors the Bitbucket OIDC deploy pattern.
inputs:
  role-arn:
    description: IAM role ARN to assume (repo/env variable AWS_OIDC_ROLE_ARN)
    required: true
  aws-region:
    description: AWS region
    required: false
    default: us-east-2
  session-name:
    description: STS session name
    required: false
    default: gha-${{ github.run_id }}
runs:
  using: composite
  steps:
    # Sem isso a configure-aws-credentials cai no chain de providers padrao e morre com
    # "Could not load credentials from any providers" — erro que nao diz o que falta.
    - name: Checar role-arn
      shell: bash
      env:
        ROLE_ARN: ${{ inputs.role-arn }}
      run: |
        set -euo pipefail
        if [ -z "$ROLE_ARN" ]; then
          echo "::error title=AWS_OIDC_ROLE_ARN ausente::O secret AWS_OIDC_ROLE_ARN nao esta definido para ${{ github.repository }}."
          echo "::error::Cadastre em Settings > Secrets and variables > Actions (repo ou environment) com o ARN da role que confia no OIDC do GitHub."
          echo "::error::Se o workflow chamador usa 'secrets: inherit', o secret precisa existir no repo, no environment do job, ou na org."
          exit 1
        fi
        case "$ROLE_ARN" in
          arn:aws:iam::*:role/*) ;;
          *) echo "::error title=AWS_OIDC_ROLE_ARN invalido::Esperado 'arn:aws:iam::<conta>:role/<nome>'."; exit 1 ;;
        esac
    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.role-arn }}
        aws-region: ${{ inputs.aws-region }}
        role-session-name: ${{ inputs.session-name }}

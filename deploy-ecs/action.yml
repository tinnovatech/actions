name: deploy-ecs
description: Build & push a Docker image to the caller's ECR account, then force a new ECS deployment. Shell orchestrated via Taskfile.
# Mirrors the BB "Push & Deploy" step of the *-service repos: ECR = account of the assumed OIDC role,
# image tagged :<env> (matches the ECS task definition) + :<short-sha>, then `ecs update-service --force-new-deployment`.
# Assumes AWS credentials are already present in the job env (run tinnovatech/actions/aws-oidc-login first).
inputs:
  image-name:  { description: "ECR repository name (e.g. crava-auth)", required: true }
  image-tag:   { description: "primary image tag (e.g. dev|qas|prd) — must match the ECS task definition", required: true }
  dockerfile:  { description: "path to the Dockerfile", required: false, default: "Dockerfile" }
  cluster:     { description: "ECS cluster name", required: true }
  service:     { description: "ECS service name", required: true }
  aws-region:  { description: "AWS region", required: false, default: "us-east-1" }
  wait:        { description: "block the job on the rollout outcome. Default false: fire-and-trust (circuit breaker owns completion/rollback server-side). Set true only on a stable/non-spot runner.", required: false, default: "false" }
  circuit-breaker: { description: "enable ECS deployment circuit breaker + rollback (server-side self-heal)", required: false, default: "true" }
  wait-timeout:    { description: "max seconds to watch the rollout before failing", required: false, default: "900" }
runs:
  using: composite
  steps:
    - name: ECR login
      uses: aws-actions/amazon-ecr-login@v2
    - uses: docker/setup-buildx-action@v3
    - name: Build, push & roll out (Taskfile)
      shell: bash
      env:
        IMAGE_NAME: ${{ inputs.image-name }}
        IMAGE_TAG: ${{ inputs.image-tag }}
        DOCKERFILE: ${{ inputs.dockerfile }}
        CLUSTER: ${{ inputs.cluster }}
        SERVICE: ${{ inputs.service }}
        AWS_REGION: ${{ inputs.aws-region }}
        WAIT: ${{ inputs.wait }}
        CIRCUIT_BREAKER: ${{ inputs.circuit-breaker }}
        WAIT_TIMEOUT: ${{ inputs.wait-timeout }}
        GIT_SHA: ${{ github.sha }}
      run: |
        sh -c "$(curl -sSL https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin
        task --dir "$GITHUB_WORKSPACE" -t "${{ github.action_path }}/Taskfile.yml" deploy
